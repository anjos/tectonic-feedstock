context:
  name: tectonic
  version: "0.16.9"
  sha256: 9861d4d4230b987d8560f1b84fe6c8a550738401be65b9425b0c7d0466178f2b

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/tectonic-typesetting/${{ name }}/archive/refs/tags/${{ name }}@${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - if: win
      then:
        - m2w64-pkg-config
      else:
        - pkg-config
    - if: build_platform != target_platform
      then:
        - glib
        - harfbuzz
  host:
    - if: not osx
      then:
        - expat
        - fontconfig
    - freetype
    - glib  # development files needed by harfbuzz
    - graphite2
    - harfbuzz
    - icu
    - libpng
    - openssl
    - zlib
  run:
    - if: not osx
      then:
        - fontconfig
    - freetype
    - graphite2
    - harfbuzz
    - icu
    - libpng
    - openssl
    - zlib

tests:
  - files:
      recipe:
        - example.tex
    script:
      - tectonic --help
      - tectonic example.tex

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A modernized, complete, standalone TeX/LaTeX engine.
  homepage: https://tectonic-typesetting.github.io/
  repository: https://github.com/tectonic-typesetting/tectonic/
  documentation: https://tectonic-typesetting.github.io/book/latest/

extra:
  recipe-maintainers:
    - pkgw
    - anjos
